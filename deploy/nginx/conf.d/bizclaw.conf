## 1. APPS Subdomains → BizClaw Dashboard (Backend)
server {
    listen 80;
    server_name apps.bizclaw.vn apps.viagent.vn apps.vimate.vn;
    
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name apps.bizclaw.vn apps.viagent.vn apps.vimate.vn;

    ssl_certificate     /etc/letsencrypt/live/bizclaw.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bizclaw.vn/privkey.pem;

    location / {
        proxy_pass http://172.17.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }
}

## 2. MAIN Domains → Landing Page
server {
    listen 80;
    server_name bizclaw.vn www.bizclaw.vn viagent.vn www.viagent.vn vimate.vn www.vimate.vn;
    
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name bizclaw.vn www.bizclaw.vn viagent.vn www.viagent.vn vimate.vn www.vimate.vn;

    ssl_certificate     /etc/letsencrypt/live/bizclaw.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bizclaw.vn/privkey.pem;

    root /var/www/viagent-landing;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, no-cache, must-revalidate, max-age=0";
    }
}

