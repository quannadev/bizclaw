name: Integration Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config libudev-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

      - name: Run integration tests
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/test
          RUST_LOG: info
        run: |
          cargo test --workspace --test integration -- --test-threads=1

  e2e-tests:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Playwright
        run: |
          cargo install playwright
          playwright install --with-deps chromium

      - name: Build desktop app
        run: |
          cd desktop && cargo build --release

      - name: Run Playwright tests
        run: |
          pnpm install
          pnpm test:e2e

  desktop-tests:
    name: Desktop App Tests
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Tauri CLI
        run: |
          cargo install tauri-cli

      - name: Run desktop tests
        run: |
          cd desktop && cargo test

  memory-integration:
    name: Memory System Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Test memory-redb
        run: |
          cargo test -p bizclaw-memory-redb --test '*' -- --test-threads=1

      - name: Test memory-search
        run: |
          cargo test -p bizclaw-memory-search --test '*' -- --test-threads=1

      - name: Test memory-vector
        run: |
          cargo test -p bizclaw-memory-vector --test '*' -- --test-threads=1

  marketplace-integration:
    name: Marketplace Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Test skills marketplace
        run: |
          cargo test -p bizclaw-skills --test '*'

      - name: Test skill registration
        run: |
          cargo test -p bizclaw-skills marketplace

      - name: Test skill search
        run: |
          cargo test -p bizclaw-skills search

  evolution-integration:
    name: Self-Evolution Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Test self-evolution
        run: |
          cargo test -p bizclaw-agent self_evolution

      - name: Test metrics collection
        run: |
          cargo test -p bizclaw-agent metrics

      - name: Test adaptation
        run: |
          cargo test -p bizclaw-agent adaptation
