name: '🖥️ Release Desktop Apps'

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (e.g., 1.0.5) — leave empty to use VERSION file'
        required: false
        default: ''

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ══════════════════════════════════════════════
  #  📦 Build Desktop Apps for all platforms
  # ══════════════════════════════════════════════
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS Apple Silicon (M1/M2/M3)
          - os: macos-14
            target: aarch64-apple-darwin
            name: BizClaw-macos-arm64
            ext: ''
            dmg: true
          # macOS Intel
          - os: macos-latest
            target: x86_64-apple-darwin
            name: BizClaw-macos-x64
            ext: ''
            dmg: true
          # Windows x64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            name: BizClaw-windows-x64
            ext: '.exe'
          # Linux x64
          - os: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            name: BizClaw-linux-x64
            ext: ''
            deb: true

    runs-on: ${{ matrix.os }}
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        shell: bash
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            V="${{ github.ref_name }}"
            echo "version=${V#v}" >> $GITHUB_OUTPUT
          elif [[ -f VERSION ]]; then
            echo "version=$(cat VERSION | tr -d '[:space:]')" >> $GITHUB_OUTPUT
          else
            echo "version=0.0.0" >> $GITHUB_OUTPUT
          fi

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev pkg-config dpkg-dev

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ matrix.target }}-desktop-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ matrix.target }}-desktop-

      # ── Build all binaries ──
      - name: Build bizclaw-desktop
        run: cargo build --release --bin bizclaw-desktop --target ${{ matrix.target }}

      - name: Build bizclaw (main server)
        run: cargo build --release --bin bizclaw --target ${{ matrix.target }}

      - name: Build bizclaw-local (CLI)
        run: cargo build --release --bin bizclaw-local --target ${{ matrix.target }}

      - name: Build bizclaw-platform (multi-tenant)
        run: cargo build --release --bin bizclaw-platform --target ${{ matrix.target }}

      # ── Package all binaries ──
      - name: Prepare dist
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          mkdir -p dist

          # Copy all binaries
          cp target/${{ matrix.target }}/release/bizclaw-desktop${{ matrix.ext }} dist/
          cp target/${{ matrix.target }}/release/bizclaw${{ matrix.ext }} dist/
          cp target/${{ matrix.target }}/release/bizclaw-local${{ matrix.ext }} dist/
          cp target/${{ matrix.target }}/release/bizclaw-platform${{ matrix.ext }} dist/

          # Copy docs
          cp README.md dist/ 2>/dev/null || true
          cp config.quickstart.toml dist/ 2>/dev/null || true

      # ═══ macOS: Create .app bundle + DMG ═══
      - name: Create macOS DMG
        if: matrix.dmg == true
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          APP_DIR="dist/dmg-staging/BizClaw.app"

          # Create .app bundle
          mkdir -p "$APP_DIR/Contents/MacOS"
          mkdir -p "$APP_DIR/Contents/Resources"

          cp dist/bizclaw-desktop "$APP_DIR/Contents/MacOS/BizClaw"
          chmod +x "$APP_DIR/Contents/MacOS/BizClaw"

          # Info.plist
          cat > "$APP_DIR/Contents/Info.plist" << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleExecutable</key><string>BizClaw</string>
            <key>CFBundleIdentifier</key><string>vn.bizclaw.desktop</string>
            <key>CFBundleName</key><string>BizClaw</string>
            <key>CFBundleDisplayName</key><string>BizClaw Desktop</string>
            <key>CFBundleVersion</key><string>${VERSION}</string>
            <key>CFBundleShortVersionString</key><string>${VERSION}</string>
            <key>CFBundlePackageType</key><string>APPL</string>
            <key>LSMinimumSystemVersion</key><string>11.0</string>
            <key>NSHighResolutionCapable</key><true/>
            <key>LSApplicationCategoryType</key><string>public.app-category.developer-tools</string>
          </dict>
          </plist>
          PLIST

          # Create DMG
          hdiutil create -volname "BizClaw Desktop ${VERSION}" \
            -srcfolder dist/dmg-staging \
            -ov -format UDZO \
            "dist/${{ matrix.name }}-${VERSION}.dmg"

          rm -rf dist/dmg-staging

          # Also create tar.gz with all binaries
          cd dist && tar czf "${{ matrix.name }}-${VERSION}.tar.gz" \
            bizclaw-desktop bizclaw bizclaw-local bizclaw-platform \
            README.md config.quickstart.toml 2>/dev/null || \
          tar czf "${{ matrix.name }}-${VERSION}.tar.gz" \
            bizclaw-desktop bizclaw bizclaw-local bizclaw-platform

      # ═══ Linux: Create .deb package ═══
      - name: Create Linux DEB
        if: matrix.deb == true
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          DEB_DIR="dist/deb-staging"

          mkdir -p "$DEB_DIR/DEBIAN"
          mkdir -p "$DEB_DIR/usr/bin"
          mkdir -p "$DEB_DIR/usr/share/applications"
          mkdir -p "$DEB_DIR/usr/share/doc/bizclaw"

          # Copy all binaries
          cp dist/bizclaw-desktop "$DEB_DIR/usr/bin/"
          cp dist/bizclaw "$DEB_DIR/usr/bin/"
          cp dist/bizclaw-local "$DEB_DIR/usr/bin/"
          cp dist/bizclaw-platform "$DEB_DIR/usr/bin/"
          chmod 755 "$DEB_DIR/usr/bin/"*

          # Desktop entry
          cat > "$DEB_DIR/usr/share/applications/bizclaw.desktop" << 'DESKTOP'
          [Desktop Entry]
          Name=BizClaw Desktop
          Comment=AI Agent Platform — Fast, autonomous, multi-channel
          Exec=bizclaw-desktop
          Terminal=false
          Type=Application
          Categories=Development;Utility;
          Icon=bizclaw
          StartupWMClass=bizclaw
          DESKTOP

          # Control file
          INSTALLED_SIZE=$(du -sk "$DEB_DIR/usr" | cut -f1)
          cat > "$DEB_DIR/DEBIAN/control" << CTRL
          Package: bizclaw
          Version: ${VERSION}
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: BizClaw Team <hello@bizclaw.vn>
          Description: BizClaw — AI Agent Platform
           Full-featured AI assistant with built-in dashboard,
           multi-agent orchestration, 80+ API endpoints,
           and support for Zalo, Telegram, Messenger channels.
          Homepage: https://bizclaw.vn
          Depends: libssl3 | libssl1.1, ca-certificates
          Installed-Size: ${INSTALLED_SIZE}
          CTRL

          # Post-install
          cat > "$DEB_DIR/DEBIAN/postinst" << 'POST'
          #!/bin/sh
          echo ""
          echo "  🦀 BizClaw installed successfully!"
          echo "  Run: bizclaw-desktop    (GUI with browser)"
          echo "  Or:  bizclaw serve      (server mode)"
          echo "  Or:  bizclaw-local      (CLI mode)"
          echo ""
          POST
          chmod 755 "$DEB_DIR/DEBIAN/postinst"

          # Build DEB
          dpkg-deb --build --root-owner-group "$DEB_DIR" "dist/${{ matrix.name }}-${VERSION}.deb"
          rm -rf "$DEB_DIR"

          # Also tar.gz
          cd dist && tar czf "${{ matrix.name }}-${VERSION}.tar.gz" \
            bizclaw-desktop bizclaw bizclaw-local bizclaw-platform

      # ═══ Windows: Create ZIP ═══
      - name: Package Windows
        if: runner.os == 'Windows'
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cd dist
          7z a "${{ matrix.name }}-${VERSION}.zip" \
            bizclaw-desktop.exe bizclaw.exe bizclaw-local.exe bizclaw-platform.exe \
            README.md config.quickstart.toml 2>/dev/null || \
          7z a "${{ matrix.name }}-${VERSION}.zip" \
            bizclaw-desktop.exe bizclaw.exe bizclaw-local.exe bizclaw-platform.exe

      # ── Upload artifacts ──
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: |
            dist/*.dmg
            dist/*.deb
            dist/*.zip
            dist/*.tar.gz
          retention-days: 30

  # ══════════════════════════════════════════════
  #  🏷️ Create GitHub Release
  # ══════════════════════════════════════════════
  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          V="${{ github.ref_name }}"
          echo "version=${V#v}" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: List artifacts
        run: find artifacts/ -type f | sort

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "🦀 BizClaw v${{ steps.version.outputs.version }}"
          body: |
            ## 🦀 BizClaw Desktop v${{ steps.version.outputs.version }}

            AI Agent Platform — Chạy độc lập trên máy tính, tích hợp Dashboard, Multi-Agent, 80+ API.

            ### 📦 Downloads

            | Platform | File | Mô tả |
            |----------|------|-------|
            | 🍎 macOS (Apple Silicon) | `BizClaw-macos-arm64-${{ steps.version.outputs.version }}.dmg` | M1/M2/M3/M4 |
            | 🍎 macOS (Intel) | `BizClaw-macos-x64-${{ steps.version.outputs.version }}.dmg` | Intel Mac |
            | 🪟 Windows | `BizClaw-windows-x64-${{ steps.version.outputs.version }}.zip` | Windows 10+ |
            | 🐧 Linux (DEB) | `BizClaw-linux-x64-${{ steps.version.outputs.version }}.deb` | Ubuntu/Debian |
            | 🐧 Linux (tar.gz) | `BizClaw-linux-x64-${{ steps.version.outputs.version }}.tar.gz` | Mọi distro |

            ### ⚡ Cài đặt nhanh

            **macOS**: Tải `.dmg` → Kéo vào Applications → Mở BizClaw
            **Windows**: Tải `.zip` → Giải nén → Chạy `bizclaw-desktop.exe`
            **Linux**: `sudo dpkg -i BizClaw-linux-x64-*.deb && bizclaw-desktop`

            ### 🎯 Binaries trong package

            | Binary | Mô tả |
            |--------|-------|
            | `bizclaw-desktop` | App desktop — tự mở browser Dashboard |
            | `bizclaw` | Main server (Gateway + Agent + API) |
            | `bizclaw-local` | CLI mode (giống OpenClaw) |
            | `bizclaw-platform` | Multi-tenant admin server |

            Dashboard tự mở tại `http://127.0.0.1:<port>` khi chạy. Kết nối Cloudflare Tunnel để truy cập từ xa.
          files: artifacts/**/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
