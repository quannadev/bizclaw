name: Security

on:
  schedule:
    - cron: '0 0 * * 0'
  push:
    branches: [main]
    paths:
      - '**/Cargo.toml'
      - '**/Cargo.lock'
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  cargo-audit:
    name: Cargo Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run cargo audit
        id: audit
        run: cargo audit
        continue-on-error: true

      - name: Fail on vulnerabilities
        if: steps.audit.outcome == 'failed'
        run: |
          echo "Vulnerabilities found!"
          exit 1

  cargo-deny:
    name: Dependency Policy Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install cargo-deny
        run: cargo install cargo-deny

      - name: Check advisories
        run: cargo deny check advisories

      - name: Check licenses
        run: cargo deny check licenses

      - name: Check banned dependencies
        run: cargo deny check bans

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Dependency Review
        uses: actions/dependency-review-action@v4

  codeql-analysis:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      packages: read
    strategy:
      fail-fast: false
      matrix:
        language: ['rust']
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init-actions@v3
        with:
          languages: ${{ matrix.language }}
          queries: security-extended

      - name: Build
        run: cargo build --workspace

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze-actions@v3
        with:
          category: "/language:${{matrix.language}}"

  trivy-scan:
    name: Container Security Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t bizclaw:security-scan .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'bizclaw:security-scan'
          format: 'json'
          output: 'trivy-results.json'
          severity: 'CRITICAL,HIGH,MEDIUM'

      - name: Upload Trivy results
        uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: trivy-results.json

  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Run GitLeaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  security-hardening:
    name: Security Hardening Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for hardcoded secrets
        run: |
          echo "Checking for hardcoded secrets..."
          if grep -r "password\s*=\s*['\"][^'\"]{8,}['\"]" --include="*.rs" .; then
            echo "WARNING: Potential hardcoded password found!"
            exit 1
          fi
          if grep -r "api_key\s*=\s*['\"][^'\"]{16,}['\"]" --include="*.rs" .; then
            echo "WARNING: Potential hardcoded API key found!"
            exit 1
          fi

      - name: Check for unsafe code
        run: |
          echo "Checking for unsafe code usage..."
          unsafe_count=$(grep -r "unsafe\s*{" --include="*.rs" . | wc -l)
          if [ "$unsafe_count" -gt 0 ]; then
            echo "Found $unsafe_count occurrences of unsafe code"
            grep -r "unsafe\s*{" --include="*.rs" . | head -20
          fi

      - name: Check for debug assertions in production
        run: |
          echo "Checking for debug assertions..."
          if grep -r "panic!" --include="*.rs" crates/bizclaw-core/src | grep -v "test"; then
            echo "WARNING: Found panic! in production code"
          fi

  dependency-freshness:
    name: Outdated Dependencies Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install cargo-outdated
        run: cargo install cargo-outdated

      - name: Check outdated dependencies
        run: cargo outdated --workspace
        continue-on-error: true
