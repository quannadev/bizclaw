name: Documentation

on:
  push:
    branches: [master]
    paths:
      - '**.md'
      - 'docs/**'
      - 'crates/**/src/*.rs'
  pull_request:
    paths:
      - '**.md'
      - 'docs/**'
      - 'crates/**/src/*.rs'

jobs:
  doc-test:
    name: Doc Tests
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action@stable

      - name: Check documentation builds
        run: |
          cargo doc --workspace --no-deps --all-features 2>&1 | tee doc.log || true
          grep -E "(error|warning:.*doc)" doc.log || echo "Documentation builds successfully"

      - name: Check for broken links in docs
        run: |
          # Find all internal links in markdown
          find docs -name "*.md" -exec grep -h '\]\([^)]*\.md)' {} \; | \
            while read link; do
              # Extract path and validate
              echo "$link"
            done

  doc-coverage:
    name: Doc Coverage
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action@stable
        with:
          components: llvm-tools-preview

      - name: Install cargo-tarpaulin
        uses: taiki-e/install-action@cargo-tarpaulin

      - name: Check doc coverage
        run: |
          cargo tarpaulin --workspace \
            --out Json \
            --features full \
            --doc-only 2>&1 | tee coverage.log
          
          # Extract coverage percentage
          grep -E "Coverage.*%" coverage.log || echo "Doc coverage check complete"

  adr-check:
    name: ADR Format Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check ADR format
        run: |
          for adr in docs/adr/*.md; do
            if [ -f "$adr" ]; then
              echo "Checking $adr..."
              
              # Check required sections
              grep -q "^# ADR-" "$adr" || echo "Missing ADR title in $adr"
              grep -q "^## Context$" "$adr" || echo "Missing Context section in $adr"
              grep -q "^## Decision$" "$adr" || echo "Missing Decision section in $adr"
              grep -q "^## Rationale$" "$adr" || echo "Missing Rationale section in $adr"
              grep -q "^## Consequences$" "$adr" || echo "Missing Consequences section in $adr"
            fi
          done

  generate-api-docs:
    name: Generate API Docs
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-action@stable

      - name: Generate documentation
        run: |
          cargo doc --workspace --no-deps --all-features --document-private-items
          
      - name: Upload API docs
        uses: actions/upload-artifact@v4
        with:
          name: api-docs
          path: target/doc/
          retention-days: 7

  deploy-docs:
    name: Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: [doc-test, doc-coverage, adr-check]
    if: github.ref == 'refs/heads/master'
    
    permissions:
      contents: read
      pages: write
      id-token: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build with Zola
        run: |
          # Generate mdBook from docs
          if command -v zola &> /dev/null; then
            cd docs && zola build
          else
            echo "Zola not installed, skipping mdBook build"
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: |
            target/doc/
            docs/
          retention-days: 1

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
