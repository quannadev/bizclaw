name: Release Binaries & Installers

on:
  push:
    tags:
      - 'v*.*.*' # Trigger on version tags

jobs:
  build_binaries:
    name: Build & Package (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            ext: ""
            cmd: deb
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            ext: ".exe"
            cmd: msi
          - os: macos-latest
            target: aarch64-apple-darwin
            ext: ""
            cmd: dmg

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Release Binary
        run: cargo build --release --bin bizclaw --target ${{ matrix.target }}

      # Create installers using cargo-packager (or direct tools)
      - name: Install cargo-deb (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: cargo install cargo-deb && cargo deb -p bizclaw --target ${{ matrix.target }}
        
      - name: Install cargo-wix (Windows)
        if: matrix.os == 'windows-latest'
        run: cargo install cargo-wix && cargo wix -p bizclaw --target ${{ matrix.target }} --nocapture

      # Note: DMG creation usually requires specific tools like cargo-bundle or cargo-packager
      - name: Install cargo-packager (macOS)
        if: matrix.os == 'macos-latest'
        run: cargo install cargo-packager && cargo packager --target ${{ matrix.target }} --formats dmg

      - name: Upload Native Binary
        uses: actions/upload-artifact@v4
        with:
          name: bizclaw-${{ matrix.target }}${{ matrix.ext }}
          path: target/${{ matrix.target }}/release/bizclaw${{ matrix.ext }}

      - name: Upload Installer Packages
        uses: actions/upload-artifact@v4
        with:
          name: installers-${{ matrix.target }}
          path: target/${{ matrix.target }}/debian/*.deb # Path varies depending on the packer tool
        continue-on-error: true

  publish:
    name: Publish to Github Releases
    needs: build_binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
